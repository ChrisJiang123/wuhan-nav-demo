name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Backend npm run lint
        run: npm run lint:backend

      - name: Detect Flutter project
        id: flutter_project
        run: |
          if [ -f apps/mobile-flutter/pubspec.yaml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Flutter
        if: steps.flutter_project.outputs.present == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter analyze
        if: steps.flutter_project.outputs.present == 'true'
        run: npm run lint:flutter

      - name: Flutter analyze pending
        if: steps.flutter_project.outputs.present != 'true'
        run: echo "No Flutter project yet; apps/mobile-flutter/pubspec.yaml will enable flutter analyze."
