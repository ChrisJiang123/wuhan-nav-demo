services:
  osrm-extract:
    image: ghcr.io/project-osrm/osrm-backend:latest
    working_dir: /data
    volumes:
      - ../osm/data:/osm:ro
      - ./data:/data
    command:
      - sh
      - -lc
      - |
        test -f /osm/wuhan.osm.pbf
        cp /osm/wuhan.osm.pbf /data/wuhan.osm.pbf
        osrm-extract -p /opt/car.lua /data/wuhan.osm.pbf

  osrm-contract:
    image: ghcr.io/project-osrm/osrm-backend:latest
    working_dir: /data
    volumes:
      - ./data:/data
    command:
      - sh
      - -lc
      - |
        test -f /data/wuhan.osrm
        osrm-contract /data/wuhan.osrm

  osrm-routed:
    image: ghcr.io/project-osrm/osrm-backend:latest
    working_dir: /data
    volumes:
      - ./data:/data:ro
    ports:
      - "${OSRM_PORT:-5000}:5000"
    command:
      - sh
      - -lc
      - |
        test -f /data/wuhan.osrm
        osrm-routed -i 0.0.0.0 -p 5000 /data/wuhan.osrm
